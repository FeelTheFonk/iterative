<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#0d0a2e"/>
      <stop offset="100%" stop-color="#050314"/>
    </radialGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft Blur Filter -->
    <filter id="soft-blur" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
    </filter>
    
    <!-- Pattern for stars -->
    <pattern id="star-pattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.6"/>
    </pattern>
    
    <!-- Orbit Pattern -->
    <pattern id="orbit-pattern" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="40" cy="40" r="5" fill="none" stroke="#4a3f7a" stroke-width="1" opacity="0.4"/>
    </pattern>
    
    <!-- Bioluminescent Gradient -->
    <linearGradient id="bio-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="50%" stop-color="#4a3f7a"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    
    <!-- Wave Pattern -->
    <path id="wave" d="M 0 30 Q 20 45 40 30 T 80 30 V 40 H 0 Z"/>
    <pattern id="wave-pattern" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
      <use href="#wave" x="0" y="0"/>
      <use href="#wave" x="80" y="0"/>
    </pattern>
  </defs>
  
  <!-- Background Layer (z-far) -->
  <rect width="800" height="600" fill="url(#bg-grad)"/>
  
  <!-- Distant Stars -->
  <rect width="800" height="600" fill="url(#star-pattern)" opacity="0.3">
    <animate attributeName="opacity" values="0.2;0.4;0.2" dur="4s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Midground - Orbit Rings -->
  <g opacity="0.4">
    <circle cx="400" cy="300" r="250" fill="none" stroke="url(#bio-grad)" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="60s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="180" fill="none" stroke="url(#bio-grad)" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="360 400 300" to="0 400 300" dur="45s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="120" fill="none" stroke="#4a3f7a" stroke-width="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0 400 300" to="360 400 300" dur="30s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Midground - Geometric Shapes -->
  <g opacity="0.6">
    <polygon points="400,250 420,285 380,285" fill="url(#bio-grad)">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;10,-5;0,0" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="450,350 470,385 430,385" fill="url(#bio-grad)">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-10,5;0,0" dur="6s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="350" cy="350" r="15" fill="#4a3f7a">
      <animate attributeName="r" values="15;20;15" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="250" r="12" fill="#ff6b9d">
      <animate attributeName="r" values="12;18;12" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Foreground - Bioluminescent Particles -->
  <g filter="url(#glow)">
    <circle cx="200" cy="150" r="8" fill="#00ffff" opacity="0.8">
      <animate attributeName="cx" values="200;220;200" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;140;150" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="450" r="6" fill="#ff6b9d" opacity="0.7">
      <animate attributeName="cx" values="600;580;600" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="450;460;450" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="500" r="5" fill="#4a3f7a" opacity="0.6">
      <animate attributeName="cx" values="350;370;350" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="500;490;500" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="200" r="4" fill="#00ffff" opacity="0.5">
      <animate attributeName="cx" values="650;630;650" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="200;210;200" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="350" r="3" fill="#ff6b9d" opacity="0.4">
      <animate attributeName="cx" values="150;160;150" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="350;345;350" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Foreground - Floating Geometric Elements -->
  <g opacity="0.5">
    <rect x="100" y="100" width="20" height="20" fill="none" stroke="#00ffff" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="0 110 110" to="360 110 110" dur="10s" repeatCount="indefinite"/>
    </rect>
    <rect x="700" y="500" width="15" height="15" fill="none" stroke="#ff6b9d" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" from="360 707 507" to="0 707 507" dur="8s" repeatCount="indefinite"/>
    </rect>
    <circle cx="400" cy="60" r="20" fill="none" stroke="#4a3f7a" stroke-width="1">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="20;25;20" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Foreground - Wave Patterns -->
  <g opacity="0.3">
    <rect width="800" height="50" fill="url(#wave-pattern)" y="500">
      <animate attributeName="y" values="500;520;500" dur="6s" repeatCount="indefinite"/>
    </rect>
    <rect width="800" height="40" fill="url(#wave-pattern)" y="550" opacity="0.2">
      <animate attributeName="y" values="550;570;550" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Center Glow Core -->
  <circle cx="400" cy="300" r="30" fill="url(#bio-grad)" opacity="0.6" filter="url(#glow)">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="30;35;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Subtle Motion -->
  <circle cx="400" cy="300" r="80" fill="none" stroke="url(#bio-grad)" stroke-width="1" opacity="0.2" filter="url(#soft-blur)">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>